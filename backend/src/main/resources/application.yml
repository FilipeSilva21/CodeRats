server:
  port: ${PORT:8080}
  tomcat:
    max-http-form-post-size: 10MB

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/devrats}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:devrats123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: true

github:
  clientId: ${GITHUB_CLIENT_ID:Iv23li2hgMfUstRiEY5I}
  clientSecret: ${GITHUB_CLIENT_SECRET:32298352b5ad28a1fc220244c1ae96b0a316c1e8}
  webhookSecret: ${GITHUB_WEBHOOK_SECRET:devrats-webhook-secret}

jwt:
  secret: devrats-jwt-secret
  expiration: 3600000 # 1 hour
  refreshExpiration: 604800000 # 7 days
